services:
  app:
    image: ${IMAGE_REF:?IMAGE_REF must be set for production deploys}
    container_name: howtoprompt
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - runtime_data:/app/.data
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      HOSTNAME: 0.0.0.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  runtime_data:
    name: howtoprompt-runtime-data
